<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        .box {
            height: 121px;
            width: 121px;
            background-color: red;
            border-radius: 70px;
            position: absolute;
            bottom: 0;
            left: 0;
           animation: anix 3s linear infinite ,aniy 1s ease-out infinite alternate;
        }

        .container {
            position: relative;
            height: 80vh;
            width: 80vw;
            background-color: blue;
        }

        @keyframes anix {
            from {
                left: 0;
            }

            to {
                left: 100%;
            }
        }

        @keyframes aniy {
            from {
                bottom: 0;
            }

            to {
                bottom: 100%;
            }
        }
